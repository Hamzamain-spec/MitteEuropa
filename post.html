<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel — MitteEuropa</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F5F2;--white:#FFFFFF;--card:#FFFFFF;--ink:#1A1614;--border:#E2DDD8;--accent:#C0392B;--muted:#7A6E68;--light:#B0A89E;--warm:#F0EBE5}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
header{background:var(--white);border-bottom:3px solid var(--ink)}
.hdr-inner{max-width:1300px;margin:0 auto;padding:18px 44px;display:flex;align-items:center;justify-content:space-between}
.logo{text-decoration:none}
.logo-name{font-family:'Source Serif 4',serif;font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-1px}
.logo-name .eu{color:var(--accent)}
nav{background:var(--ink)}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 44px;display:flex}
nav a{display:block;padding:11px 16px;color:rgba(255,255,255,0.45);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.2s}
nav a:hover{color:#fff}
.post-hero{background:var(--warm);border-bottom:2px solid var(--ink)}
.ph-inner{max-width:1300px;margin:0 auto;padding:56px 44px;display:grid;grid-template-columns:1fr 340px;gap:60px}
.ph-content{}
.ph-breadcrumb{font-size:11px;color:var(--light);margin-bottom:18px;display:flex;gap:6px;font-weight:500}
.ph-breadcrumb a{color:var(--light);text-decoration:none;transition:color 0.2s}
.ph-breadcrumb a:hover{color:var(--accent)}
.ph-cat{display:inline-block;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:4px 12px;margin-bottom:16px}
.ph-title{font-family:'Source Serif 4',serif;font-size:52px;font-weight:700;color:var(--ink);line-height:1.05;margin-bottom:18px;letter-spacing:-1px}
.ph-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--muted);padding-top:18px;border-top:1px solid var(--border2,#C8C0B8)}
.ph-meta strong{color:var(--ink);font-weight:600}
.ph-av{width:34px;height:34px;background:var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.ph-visual{background:var(--ink);min-height:300px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.ph-visual-letter{font-family:'Source Serif 4',serif;font-size:160px;font-weight:700;color:rgba(255,255,255,0.06);line-height:1;font-style:italic}
.layout{max-width:1200px;margin:48px auto;padding:0 44px;display:grid;grid-template-columns:1fr 270px;gap:40px}
.main-col{background:var(--card);padding:52px 56px;border:1px solid var(--border);border-top:3px solid var(--accent)}
.back-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--border);color:var(--muted);text-decoration:none;font-size:10px;font-weight:600;padding:8px 16px;margin-bottom:36px;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s}
.back-btn:hover{border-color:var(--ink);color:var(--ink)}
.article-body{font-size:18px;line-height:1.9;color:#2D2420;font-weight:300}
.article-body p{margin-bottom:26px}
.article-body h2{font-family:'Source Serif 4',serif;font-size:34px;font-weight:600;color:var(--ink);margin:50px 0 16px;letter-spacing:-0.5px;position:relative;padding-bottom:12px}
.article-body h2::after{content:'';position:absolute;bottom:0;left:0;width:32px;height:2px;background:var(--accent)}
.article-body h3{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;color:var(--ink);margin:28px 0 10px}
.article-body a{color:var(--accent);font-weight:500;text-decoration:none;border-bottom:1px solid rgba(192,57,43,0.3);transition:all 0.2s}
.article-body a:hover{color:var(--ink);border-color:var(--ink)}
.article-body ul,.article-body ol{padding-left:26px;margin-bottom:22px}
.article-body li{margin-bottom:8px;line-height:1.8}
.article-body strong{font-weight:600;color:var(--ink)}
blockquote{border-left:3px solid var(--accent);padding:0 0 0 24px;margin:32px 0;font-family:'Source Serif 4',serif;font-size:22px;font-style:italic;color:var(--ink);line-height:1.55}
.sidebar{display:flex;flex-direction:column;gap:16px}
.widget{background:var(--card);border:1px solid var(--border);overflow:hidden}
.wh{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--warm);display:flex;align-items:center;gap:8px}
.wh-bar{width:3px;height:14px;background:var(--accent);flex-shrink:0}
.wh-title{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink)}
.wb{padding:14px 18px}
.ri{padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:padding 0.15s}
.ri:last-child{border-bottom:none;padding-bottom:0}.ri:first-child{padding-top:0}
.ri:hover{padding-left:5px}
.ri-cat{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.ri-title{font-family:'Source Serif 4',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.25;text-decoration:none;display:block}
.ri-title:hover{color:var(--accent)}
.ri-meta{font-size:11px;color:var(--light);margin-top:2px}
.about-box{background:var(--ink);padding:22px}
.ab-name{font-family:'Source Serif 4',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.ab-name .eu{color:var(--accent)}
.ab-text{font-size:13px;line-height:1.7;color:rgba(255,255,255,0.35);font-weight:300}
.not-found{text-align:center;padding:80px;color:var(--muted);grid-column:1/-1}
footer{background:var(--ink);margin-top:52px;text-align:center;padding:24px;font-size:12px;color:rgba(255,255,255,0.2)}
footer a{color:rgba(255,255,255,0.2);text-decoration:none;margin:0 10px;transition:color 0.2s}
footer a:hover{color:#fff}
.fl{font-family:'Source Serif 4',serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-0.5px}
.fl span{color:var(--accent)}
</style>
</head>
<body>
<header><div class="hdr-inner"><a href="index.html" class="logo"><div class="logo-name">Mitte<span class="eu">Europa</span></div></a></div></header>
<nav><div class="nav-inner"><a href="index.html">← Start</a><a href="index.html">Politik</a><a href="index.html">Wirtschaft</a><a href="index.html">Gesellschaft</a><a href="index.html">Kultur</a><a href="index.html">Technik</a></div></nav>
<div id="post-hero" class="post-hero" style="display:none">
  <div class="ph-inner">
    <div class="ph-content">
      <div class="ph-breadcrumb"><a href="index.html">Start</a><span>/</span><span id="ph-cat-bc">Allgemein</span></div>
      <div class="ph-cat" id="ph-cat">Allgemein</div>
      <div class="ph-title" id="ph-title"></div>
      <div class="ph-meta">
        <div class="ph-av" id="ph-av">R</div>
        <div><strong id="ph-author">Redaktion</strong></div>
        <span>· <span id="ph-date"></span></span>
        <span>· <span id="ph-read">5 Min.</span></span>
      </div>
    </div>
    <div class="ph-visual"><div class="ph-visual-letter" id="ph-letter">A</div></div>
  </div>
</div>
<div class="layout">
  <div class="main-col">
    <a href="index.html" class="back-btn">← Alle Artikel</a>
    <div id="article-body" class="article-body"></div>
    <div id="not-found" class="not-found" style="display:none"><h2 style="font-family:'Source Serif 4',serif;font-size:34px;color:var(--ink);font-weight:600">Artikel nicht gefunden.</h2></div>
  </div>
  <aside class="sidebar">
    <div class="about-box"><div class="ab-name">Mitte<span class="eu">Europa</span></div><div class="ab-text">Das deutsche Blog für alle Themen — täglich neu.</div></div>
    <div class="widget"><div class="wh"><div class="wh-bar"></div><div class="wh-title">Weitere Artikel</div></div><div class="wb"><div id="recent-posts"></div></div></div>
  </aside>
</div>
<footer><div class="fl">Mitte<span>Europa</span></div><p>&copy; 2026 MitteEuropa &nbsp;|&nbsp;<a href="#">Impressum</a>&nbsp;|&nbsp;<a href="#">Datenschutz</a></p></footer>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const SITE_NAME = 'mitteeuropa';
const GIST_ID = '42ea11087f40fdba423f8eb0f575ac96'; // Same Gist for all sites!

async function loadPost() {
  try {
    console.log('Fetching post from Gist ID:', GIST_ID);
    console.log('Looking for post ID:', id);
    
    const rawUrl = `https://gist.githubusercontent.com/Hamzamain-spec/${GIST_ID}/raw/posts.json`;
    const response = await fetch(rawUrl);
    
    if (response.ok) {
      const allPosts = await response.json();
      console.log('All posts:', allPosts);
      
      const sitePosts = allPosts.filter(post => post.site === SITE_NAME);
      console.log(`Found ${sitePosts.length} posts for site: ${SITE_NAME}`);
      
      const post = sitePosts.find(p => p.id == id);
      console.log('Found post:', post);
      
      if (post) {
        document.title = post.title + ' — MitteEuropa';
        document.getElementById('ph-title').textContent = post.title;
        document.getElementById('ph-cat').textContent = post.category || 'Allgemein';
        document.getElementById('ph-cat-bc').textContent = post.category || 'Allgemein';
        document.getElementById('ph-author').textContent = post.author || 'Redaktion';
        document.getElementById('ph-av').textContent = (post.author || 'R').charAt(0).toUpperCase();
        document.getElementById('ph-date').textContent = new Date(post.date).toLocaleDateString('de-DE', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
        
        const words = post.content.replace(/<[^>]+>/g, '').split(' ').length;
        document.getElementById('ph-read').textContent = Math.max(1, Math.round(words / 200)) + ' Min. Lesezeit';
        
        document.getElementById('ph-letter').textContent = post.title.charAt(0).toUpperCase();
        document.getElementById('article-body').innerHTML = post.content;
        document.getElementById('post-hero').style.display = 'block';
        
        // Recent posts
        const rp = document.getElementById('recent-posts');
        rp.innerHTML = '';
        sitePosts.slice().reverse().slice(0, 6).forEach(p => {
          if (p.id == id) return;
          rp.innerHTML += `<div class="ri"><div class="ri-cat">${p.category || 'Allgemein'}</div><a class="ri-title" href="post.html?id=${p.id}">${p.title}</a><div class="ri-meta">${p.author || 'Redaktion'} · ${new Date(p.date).toLocaleDateString('de-DE')}</div></div>`;
        });
      } else {
        console.log('Post not found for ID:', id);
        document.getElementById('not-found').style.display = 'block';
      }
    } else {
      console.error('Failed to fetch from Gist:', response.status);
      document.getElementById('not-found').style.display = 'block';
    }
  } catch (error) {
    console.error('Error loading post:', error);
    document.getElementById('not-found').style.display = 'block';
  }
}

loadPost();
</script>
</body>
</html>
